# Nginx configuration for the DigiHub marketing/docs website (static site).
#
# Fully static — no backend, no build step, no systemd service. Nginx just
# serves the files directly from /opt/digihub-website.
#
# Deliberately a separate file/server block from the bot's own
# /etc/nginx/sites-available/digihub — the two share nothing but the nginx
# daemon itself, so neither config change can affect the other's uptime.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/digihub-website
#   sudo ln -s /etc/nginx/sites-available/digihub-website /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS termination is NOT configured here — run:
#   sudo certbot --nginx -d digihubhmax.com -d www.digihubhmax.com
# once DNS for both names resolves directly to this server (DNS-only /
# "grey cloud" in Cloudflare, not proxied — matches how bot.digihubhmax.com
# is set up). certbot's nginx plugin rewrites this file in place (adds the
# listen 443/ssl block + http->https redirect), so after running it, pull
# /etc/nginx/sites-available/digihub-website back into this repo file to
# keep them in sync.

server {
    listen 80;
    listen [::]:80;
    server_name digihubhmax.com www.digihubhmax.com;

    root /opt/digihub-website;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
