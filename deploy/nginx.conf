# Nginx configuration for the DigiHub marketing/docs website (static site).
#
# Fully static, no backend, no systemd service — nginx serves files from
# /opt/digihub-website, which deploy/deploy.sh keeps as a symlink into
# /opt/digihub-website-releases/<timestamp> (atomic release swap; see that
# script for the full deploy pipeline: deploy/build.sh content-hashes
# style.css/main.js/admin.css/admin.js and rewrites the HTML to match).
#
# Deliberately a separate file/server block from the bot's own
# /etc/nginx/sites-available/digihub — the two share nothing but the nginx
# daemon itself, so neither config change can affect the other's uptime.
#
# TLS is live (Let's Encrypt via certbot --nginx, 2026-07-16) — this is the
# post-certbot version of the file, pulled from
# /etc/nginx/sites-enabled/digihub-website to keep them in sync. If you
# re-run certbot (e.g. adding a domain), pull the file back again afterward.
#
# Caching strategy (no asset should ever need a manual Cloudflare purge):
#   - Hashed assets (style.<hash>.css, main.<hash>.js, ...) are immutable by
#     construction — content changes produce a new filename, so the old URL
#     never needs to be invalidated. Cached for a year, both by Cloudflare's
#     edge and the visitor's browser.
#   - Everything else that can change without a filename change — the HTML
#     pages, config.js (edited via the admin panel), and the logo — is
#     served with a fixed filename on purpose (the admin panel and README
#     depend on those exact paths). Those get "no-store": verified live
#     that Cloudflare does NOT treat a bare "no-cache" as "skip the edge
#     cache" — it still caches the object and just adds revalidation
#     semantics, falling back to its own default edge TTL (4h) for how
#     long it holds that copy, which is the exact staleness bug this
#     whole pipeline exists to kill. "no-store" is the one directive
#     Cloudflare unambiguously honors as "never cache this at the edge",
#     so every request for these few small, infrequently-fetched files
#     goes to origin — no ambiguity, no possible staleness, ever.

server {
    server_name digihubhmax.com www.digihubhmax.com;

    root /opt/digihub-website;
    index index.html;

    # Content-hashed build assets — safe to cache forever.
    location ~* "^/assets/(css|js)/[a-z0-9\-]+\.[0-9a-f]{10}\.(css|js)$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Fixed-filename content — always revalidate, never long-cached.
    location = /assets/js/config.js {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /assets/img/logo.jpg {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri.html $uri/ =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/digihubhmax.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/digihubhmax.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = www.digihubhmax.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = digihubhmax.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name digihubhmax.com www.digihubhmax.com;
    return 404; # managed by Certbot


}
